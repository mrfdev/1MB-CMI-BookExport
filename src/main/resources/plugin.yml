name: BookExport
main: com.mrfloris.exportbook.ExportBookPlugin
version: '${version}'
api-version: '${paperTarget}'
author: mrfloris
website: '${sourceUrl}'
description: Stages and publishes Minecraft books as UTF-8 text files, with a CMI CustomText profile.

commands:
  bookexport:
    aliases: [bexport]
    description: Stage or export the held book, or inspect and administer BookExport.
    usage: /bookexport [export|stage|info|help|list|reload|debug|admin <status|list|review|approve|changes|publish|history|reload|debug>]

permissions:
  bookexport.admin:
    description: Grants all non-replacing BookExport administration and export capabilities.
    default: op
    children:
      bookexport.export: true
      bookexport.export.custom-title: true
      bookexport.info: true
      bookexport.help: true
      bookexport.admin.status: true
      bookexport.admin.list: true
      bookexport.admin.list.staged: true
      bookexport.admin.list.archive: true
      bookexport.admin.list.backups: true
      bookexport.admin.review: true
      bookexport.admin.approve: true
      bookexport.admin.publish: true
      bookexport.admin.history: true
      bookexport.admin.reload: true
      bookexport.admin.debug: true

  bookexport.export:
    description: Allows exporting a held written or writable book.
    default: op

  bookexport.export.custom-title:
    description: Allows choosing an export title instead of using the signed title.
    default: op

  bookexport.info:
    description: Allows viewing public BookExport version and compatibility information.
    default: true

  bookexport.help:
    description: Allows viewing BookExport command help.
    default: true

  bookexport.admin.status:
    description: Allows viewing BookExport configuration and output health.
    default: op

  bookexport.admin.list:
    description: Allows listing published text files.
    default: op

  bookexport.admin.list.staged:
    description: Allows listing staged draft filenames.
    default: op

  bookexport.admin.list.archive:
    description: Allows listing archived draft filenames.
    default: op

  bookexport.admin.list.backups:
    description: Allows listing replacement backup filenames.
    default: op

  bookexport.admin.review:
    description: Allows viewing staged-draft manifest metadata and checksum integrity.
    default: op

  bookexport.admin.approve:
    description: Allows approving exact staged-draft bytes or requesting changes.
    default: op

  bookexport.admin.publish:
    description: Allows publishing staged drafts without destructive replacement.
    default: op

  bookexport.admin.replace:
    description: Allows replacing a published file after creating a backup.
    default: false

  bookexport.admin.history:
    description: Allows viewing manifest-backed publication history and audit metadata.
    default: op

  bookexport.admin.reload:
    description: Allows reloading and validating BookExport configuration.
    default: op

  bookexport.admin.debug:
    description: Allows viewing BookExport runtime and held-book diagnostics.
    default: op

  exportbook.command:
    description: Legacy alias for bookexport.admin.
    default: false
    children:
      bookexport.admin: true

  exportbook.export:
    description: Legacy alias for exporting with signed or custom titles.
    default: false
    children:
      bookexport.export: true
      bookexport.export.custom-title: true

  exportbook.list:
    description: Legacy alias for bookexport.admin.list.
    default: false
    children:
      bookexport.admin.list: true

  exportbook.help:
    description: Legacy alias for bookexport.help.
    default: false
    children:
      bookexport.help: true

  exportbook.reload:
    description: Legacy alias for bookexport.admin.reload.
    default: false
    children:
      bookexport.admin.reload: true
