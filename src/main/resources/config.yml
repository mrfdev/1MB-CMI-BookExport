# BookExport 3 configuration
#
# Fresh version 3 configurations stage exports for review before publication.
# Existing version 2 files load unchanged in direct compatibility mode; BookExport
# never rewrites the file or moves existing exports during migration.
config-version: 3

# staged: /bookexport writes a draft; an administrator publishes it explicitly.
# direct: preserve the version 2 behavior and write immediately to the published
#         destination. /bookexport stage always stages, in either mode.
workflow-mode: staged

# Workflow directories.
# - Relative paths stay inside plugins/BookExport/.
# - ~/ starts at the server root.
# - Absolute paths are accepted because only trusted admins can edit this file.
# The four resolved directories must be writable and must not overlap.
staging-directory: "staging"
archive-directory: "archive"
backup-directory: "backups"

# Published destination. The existing key name is retained for compatibility.
exported-books-directory: "~/plugins/CMI/CustomText/"

# Collision behavior used by /bookexport admin publish when no mode is supplied:
# fail, unique, or replace-with-backup. Replacement always creates a backup and
# also requires the separately granted bookexport.admin.replace permission.
publish-collision-mode: fail

# File-name template. Supported placeholders:
# %title%, %book_title%, %author%, %player%, %uuid%, %date%, %time%,
# %timestamp%, and %pages%.
filename-format: "%title%"

# Lowercase names avoid CMI command collisions on case-sensitive filesystems.
lowercase-filenames: true

# Maximum final filename-base length before the .txt extension (16-160 code
# points). A filesystem-safe UTF-8 byte ceiling can shorten it further.
maximum-filename-length: 96

# Page separation. %pageNumber% and %pages% are supported in the markup.
pagination: true
pagination-markup: "<NextPage>"

# CMI needs <NextPage> only BETWEEN pages. Enable this only for visible headings
# such as "=== Page %pageNumber% of %pages% ===".
pagination-on-first-page: false

# In cmi mode this controlled first line prevents book content from accidentally
# becoming CMI's first-line directive. Use <AutoPage> for CMI navigation controls.
cmi-document-header: "<AutoPage>"

# Include title, author, exporter, timestamp, page count, and UTF-16 unit count.
book-meta: false

# vanilla: preserve section-sign formatting codes
# legacy:  convert section signs to ampersands
# strip:   remove valid Minecraft formatting codes
# cmi:     convert colors to {#RRGGBB} and decorations to & codes
# mini:    convert colors and decorations to MiniMessage tags
color-code-handling: cmi

# Number of filenames per /bookexport list page (1-50).
list-page-size: 10

# Adds detailed, content-free export diagnostics to the server log.
debug-logging: false
